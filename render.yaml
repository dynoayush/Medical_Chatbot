services:
  - type: web
    name: medical-chatbot
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: medical-chatbot
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: llama3.2:3b
      - key: NUM_PREDICT
        value: "120"
      - key: SEARCH_K
        value: "3"
      - key: FETCH_K
        value: "10"
      - key: CHAT_DB_URL
        value: sqlite:///chat_history.db
      - key: FLASK_SECRET_KEY
        generateValue: true
